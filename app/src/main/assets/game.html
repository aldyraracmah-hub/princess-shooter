<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Petualangan Permen 🎀</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
          --pink: #ff69b4;
          --deep-pink: #e91e8c;
          --light-pink: #ffb6d9;
          --cream: #fff5f9;
          --gold: #f5c842;
          --bg: #ffe0f0;
        }
        * { margin:0; padding:0; box-sizing:border-box; touch-action:manipulation; }
        body {
          background: #1a0a12;
          font-family:'Nunito',sans-serif;
          overflow:hidden;
          height:100vh; width:100vw;
          display:flex; align-items:center; justify-content:center;
        }

        /* ===== SCREENS ===== */
        .screen { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; flex-direction:column; transition:opacity .4s; }
        .screen.hidden { opacity:0; pointer-events:none; }

        /* ===== TITLE SCREEN ===== */
        #title-screen {
          background: radial-gradient(ellipse at center, #ffe8f5 0%, #ffb6d9 100%);
        }
        .title-logo {
          font-family:'Fredoka One',cursive;
          font-size:clamp(32px,7vw,56px);
          color:#e91e8c;
          text-shadow: 3px 3px 0 #ff69b4, 5px 5px 0 rgba(233,30,140,.3);
          text-align:center;
          line-height:1.1;
          animation: titleBounce 2s ease-in-out infinite;
        }
        @keyframes titleBounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
        .crown-icon { font-size:60px; animation:spin 4s linear infinite; display:block; text-align:center; margin-bottom:10px; }
        @keyframes spin { 0%{transform:rotate(-5deg)} 50%{transform:rotate(5deg)} 100%{transform:rotate(-5deg)} }
        .btn-play {
          margin-top:30px;
          background: linear-gradient(135deg,#ff69b4,#e91e8c);
          color:#fff;
          border:none; border-radius:50px;
          font-family:'Fredoka One',cursive;
          font-size:28px;
          padding:16px 60px;
          cursor:pointer;
          box-shadow: 0 6px 20px rgba(233,30,140,.5), inset 0 2px 0 rgba(255,255,255,.3);
          transition:transform .1s, box-shadow .1s;
        }
        .btn-play:active { transform:scale(.96); box-shadow:0 3px 10px rgba(233,30,140,.4); }
        .floating-cupcakes { position:absolute; inset:0; pointer-events:none; overflow:hidden; }
        .fc { position:absolute; font-size:40px; animation:floatUp linear infinite; opacity:.7; }
        @keyframes floatUp { 0%{transform:translateY(110vh) rotate(0deg)} 100%{transform:translateY(-10vh) rotate(360deg)} }

        /* ===== GAME SCREEN ===== */
        #game-screen {
          background: transparent;
          flex-direction:column;
          padding:0;
          width:100vw; height:100vh;
        }

        /* Background image */
        #bg-canvas { position:absolute; inset:0; z-index:0; }
        #bg-image {
          position:absolute; inset:0; z-index:0;
          width:100%; height:100%;
          object-fit:cover;
          display:none;
        }

        .game-wrapper {
          position:relative; z-index:1;
          width:100%; height:100%;
          display:flex; flex-direction:column;
          padding: 6px 6px 4px;
          gap:4px;
        }

        /* ===== HUD ===== */
        .hud {
          display:flex; align-items:center; justify-content:space-between;
          background:rgba(255,255,255,.85);
          border-radius:16px;
          padding:5px 12px;
          box-shadow: 0 4px 15px rgba(233,30,140,.2);
          border: 2px solid #ffb6d9;
          flex-shrink:0;
          gap:8px;
        }
        .hud-title {
          font-family:'Fredoka One',cursive;
          color:#e91e8c;
          font-size:clamp(12px,3vw,20px);
          line-height:1.1;
        }
        .hud-title span { color:#f5c842; display:block; font-size:80%; }
        .hud-stat { text-align:center; }
        .hud-stat-label { font-size:10px; color:#888; font-weight:800; text-transform:uppercase; }
        .hud-stat-val {
          font-family:'Fredoka One',cursive;
          font-size:clamp(16px,4vw,28px);
          color:#e91e8c;
        }
        .score-bar-wrap { flex:1; margin:0 12px; }
        .score-bar-bg {
          background:#ffcce6;
          border-radius:20px;
          height:16px;
          overflow:hidden;
          border:2px solid #ff69b4;
        }
        .score-bar-fill {
          height:100%;
          background: linear-gradient(90deg,#ff69b4,#e91e8c,#f5c842);
          border-radius:20px;
          transition:width .5s ease;
          width:0%;
        }
        .score-label { font-size:10px; color:#888; font-weight:800; text-align:center; margin-top:2px; }

        /* ===== POWERUP BAR ===== */
        .powerup-bar {
          display:flex; justify-content:center; align-items:center; gap:20px;
          flex-shrink:0;
          padding: 2px 0 0;
        }
        .powerup-btn {
          width:56px; height:56px;
          border-radius:16px;
          border:3px solid #ffb6d9;
          background:rgba(255,255,255,.9);
          cursor:pointer;
          display:flex; align-items:center; justify-content:center;
          font-size:28px;
          box-shadow:0 3px 10px rgba(233,30,140,.2);
          transition:transform .1s, border-color .2s;
          position:relative;
          overflow:visible;
          padding:4px;
        }
        .powerup-btn img {
          width:100%; height:100%;
          object-fit:contain;
          image-rendering:pixelated;
          border-radius:10px;
        }
        .powerup-btn .pu-fallback { font-size:28px; }
        .powerup-btn.active {
          border-color:#e91e8c;
          box-shadow:0 0 15px rgba(233,30,140,.6), 0 0 30px rgba(233,30,140,.3);
          transform:scale(1.15);
          background: rgba(255,200,230,.95);
          animation: puActivePulse 0.8s ease-in-out infinite alternate;
        }
        @keyframes puActivePulse {
          0%{ box-shadow:0 0 15px rgba(233,30,140,.6), 0 0 30px rgba(233,30,140,.3); }
          100%{ box-shadow:0 0 25px rgba(233,30,140,.9), 0 0 50px rgba(233,30,140,.5); }
        }
        .powerup-btn.disabled { opacity:.4; cursor:not-allowed; }
        .powerup-count {
          position:absolute; top:-8px; right:-8px;
          background:#e91e8c; color:#fff;
          font-size:12px; font-weight:800;
          min-width:22px; height:22px;
          padding:0 4px;
          border-radius:11px;
          display:flex; align-items:center; justify-content:center;
          border:2px solid #fff;
          z-index:10;
          box-shadow:0 2px 6px rgba(0,0,0,.3);
        }
        /* Active powerup indicator arrow */
        .pu-mode-banner {
          position:fixed; top:50%; left:50%;
          transform:translate(-50%,-50%);
          background:rgba(233,30,140,.9);
          color:#fff;
          font-family:'Fredoka One',cursive;
          font-size:16px;
          padding:8px 20px;
          border-radius:20px;
          pointer-events:none;
          z-index:400;
          opacity:0;
          transition:opacity .3s;
          white-space:nowrap;
          box-shadow:0 4px 20px rgba(0,0,0,.3);
        }
        .pu-mode-banner.show { opacity:1; }

        /* ===== MENU BUTTON ===== */
        .btn-menu {
          background: linear-gradient(135deg,#ffb6d9,#ff69b4);
          color:#fff;
          border: 2px solid #e91e8c;
          border-radius:12px;
          font-family:'Fredoka One',cursive;
          font-size:13px;
          padding:6px 10px;
          cursor:pointer;
          box-shadow:0 3px 10px rgba(233,30,140,.3);
          transition:transform .1s;
          white-space:nowrap;
          flex-shrink:0;
        }
        .btn-menu:active { transform:scale(.95); }

        /* ===== GRID ===== */
        .grid-container {
          flex:1;
          display:flex; align-items:center; justify-content:center;
          position:relative;
        }
        #game-grid {
          display:grid;
          gap:3px;
          padding:10px;
          background:rgba(255,240,250,.55);
          border-radius:20px;
          border:3px solid #ffb6d9;
          box-shadow: 0 8px 30px rgba(233,30,140,.2), inset 0 2px 10px rgba(255,255,255,.5);
        }
        .cell {
          border-radius:10px;
          cursor:pointer;
          display:flex; align-items:center; justify-content:center;
          position:relative;
          transition:transform .12s;
          user-select:none;
          overflow:hidden;
        }
        .cell:hover { transform:scale(1.08); z-index:2; }
        .cell.selected {
          transform:scale(1.15);
          filter:drop-shadow(0 0 8px rgba(233,30,140,.8));
          z-index:3;
        }
        /* Powerup mode: cells that can be targeted glow */
        body.powerup-mode .cell { cursor:crosshair; }
        body.powerup-mode .cell:not(.empty-cell):hover {
          transform:scale(1.12);
          filter:drop-shadow(0 0 10px rgba(245,200,66,.9));
          z-index:5;
        }
        body.powerup-mode .cell.empty-cell:hover {
          background:rgba(245,200,66,.3);
          transform:scale(1.08);
        }
        .cell.matched { animation:matchPop .4s ease forwards; }
        @keyframes matchPop {
          0%{transform:scale(1)}
          30%{transform:scale(1.3)}
          60%{transform:scale(.8)}
          100%{transform:scale(0);opacity:0}
        }
        .cell.falling { animation:fallIn .25s ease; }
        @keyframes fallIn {
          0%{transform:translateY(-30px);opacity:0}
          100%{transform:translateY(0);opacity:1}
        }
        .cell.hint { animation:hintPulse 1s ease infinite; }
        @keyframes hintPulse {
          0%,100%{transform:scale(1)}
          50%{transform:scale(1.1);filter:drop-shadow(0 0 6px gold)}
        }
        @keyframes hintArrow {
          0%{transform:translate(-50%,-50%) scale(1);}
          100%{transform:translate(-50%,-50%) scale(1.3);}
        }
        .cell-img {
          width:100%; height:100%;
          object-fit:contain;
          image-rendering:pixelated;
          pointer-events:none;
        }
        .cell.frozen { box-shadow: inset 0 0 8px rgba(100,180,255,0.6); }
        .cell.frozen::after {
          content:'🧊';
          position:absolute;
          inset:0;
          display:flex; align-items:center; justify-content:center;
          font-size:1.2em;
          background:rgba(160,210,255,.35);
          border-radius:8px;
          pointer-events:none;
        }
        .cell.empty-cell {
          background: rgba(255,220,240,.18);
          border: 2px dashed rgba(233,30,140,.25);
        }
        .cell.empty-cell:hover { background: rgba(255,180,220,.35); }

        /* ===== PRINCESS / CHARACTER AREA ===== */
        .princess-area {
          display:flex; align-items:flex-end; justify-content:center;
          gap:20px;
          flex-shrink:0;
          padding-bottom:2px;
          height: clamp(70px,12vh,100px);
        }
        #princess-canvas {
          height:100%;
          width:auto;
          image-rendering:pixelated;
          display:none;
        }

        .char-wrapper {
          position:relative;
          height:100%;
          display:flex; align-items:flex-end;
        }
        #character-sprite {
          height:100%;
          width:auto;
          image-rendering:pixelated;
          display:block;
        }

        /* Hand item — cupcake OR powerup held in character's hand */
        #hand-item {
          position:absolute;
          top: 10%;
          left: 52%;
          width: 38%;
          height: auto;
          image-rendering:pixelated;
          pointer-events:none;
          transition: opacity 0.1s;
          filter: drop-shadow(0 3px 6px rgba(233,30,140,0.6));
          transform-origin: center bottom;
          animation: handItemBob 1s ease-in-out infinite;
        }
        @keyframes handItemBob {
          0%,100%{ transform: translateY(0px) rotate(5deg) scale(1); }
          50%{ transform: translateY(-5px) rotate(5deg) scale(1.05); }
        }
        /* When powerup is held — slightly different glow */
        #hand-item.powerup-held {
          filter: drop-shadow(0 3px 10px rgba(245,200,66,0.9)) drop-shadow(0 0 6px rgba(233,30,140,.6));
          animation: handItemBob 0.6s ease-in-out infinite;
        }
        #hand-item.throwing { opacity:0; }

        /* ===== NEXT PREVIEW ===== */
        .next-cupcake {
          display:flex; flex-direction:column; align-items:center; gap:4px;
          opacity: 0.75;
        }
        .next-label { font-size:10px; color:#fff; font-weight:800; text-transform:uppercase;
          text-shadow:1px 1px 3px rgba(0,0,0,.6); }
        .cupcake-preview-img {
          image-rendering:pixelated;
          object-fit:contain;
          filter: drop-shadow(0 1px 3px rgba(0,0,0,.4));
        }

        /* ===== SCORE POPUP ===== */
        .score-popup {
          position:absolute;
          font-family:'Fredoka One',cursive;
          font-size:22px;
          color:#e91e8c;
          text-shadow:2px 2px 0 rgba(255,255,255,.8);
          pointer-events:none;
          z-index:100;
          animation:scoreFloat 1.2s ease forwards;
        }
        @keyframes scoreFloat {
          0%{transform:translateY(0);opacity:1}
          100%{transform:translateY(-80px);opacity:0}
        }

        /* ===== EXPLOSION ===== */
        .explosion-particle {
          position:absolute;
          pointer-events:none;
          z-index:50;
          font-size:20px;
          animation:explodeParticle .6s ease forwards;
        }
        .pecah-anim {
          position:fixed;
          pointer-events:none;
          z-index:80;
          image-rendering:pixelated;
          animation:pecahFadeOut .5s ease forwards;
        }
        @keyframes explodeParticle {
          0%{transform:translate(0,0) scale(1);opacity:1}
          100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0}
        }
        @keyframes pecahFadeOut {
          0%{opacity:1;transform:scale(1);}
          80%{opacity:1;transform:scale(1.1);}
          100%{opacity:0;transform:scale(0.8);}
        }

        /* ===== FLYING ITEM (cupcake or powerup) ===== */
        .fly-item {
          position:fixed;
          pointer-events:none;
          z-index:300;
          image-rendering:pixelated;
          transform-origin:center center;
        }

        /* ===== OVERLAY MODALS ===== */
        .overlay {
          position:fixed; inset:0;
          background:rgba(0,0,0,.5);
          backdrop-filter:blur(4px);
          display:flex; align-items:center; justify-content:center;
          z-index:200;
          opacity:0; pointer-events:none;
          transition:opacity .3s;
        }
        .overlay.show { opacity:1; pointer-events:all; }
        .modal {
          background: linear-gradient(135deg,#fff5f9,#ffe0f0);
          border-radius:30px;
          padding:30px 40px;
          text-align:center;
          border:4px solid #ffb6d9;
          box-shadow:0 20px 60px rgba(233,30,140,.3);
          max-width:90vw;
          transform:scale(.8);
          transition:transform .3s;
        }
        .overlay.show .modal { transform:scale(1); }
        .modal-title {
          font-family:'Fredoka One',cursive;
          font-size:36px;
          color:#e91e8c;
          margin-bottom:10px;
        }
        .modal-score {
          font-family:'Fredoka One',cursive;
          font-size:28px;
          color:#f5c842;
          margin-bottom:20px;
        }
        .btn-modal {
          background:linear-gradient(135deg,#ff69b4,#e91e8c);
          color:#fff;
          border:none; border-radius:30px;
          font-family:'Fredoka One',cursive;
          font-size:20px;
          padding:12px 40px;
          cursor:pointer;
          margin:6px;
          box-shadow:0 4px 15px rgba(233,30,140,.4);
          transition:transform .1s;
        }
        .btn-modal:active { transform:scale(.96); }

        /* ===== COMBO TEXT ===== */
        .combo-text {
          position:fixed;
          top:30%;
          left:50%;
          transform:translateX(-50%);
          font-family:'Fredoka One',cursive;
          font-size:clamp(28px,8vw,52px);
          color:#f5c842;
          text-shadow:3px 3px 0 #e91e8c, 5px 5px 0 rgba(0,0,0,.2);
          pointer-events:none;
          z-index:150;
          animation:comboAnim .8s ease forwards;
        }
        @keyframes comboAnim {
          0%{transform:translateX(-50%) scale(.5);opacity:0}
          30%{transform:translateX(-50%) scale(1.3);opacity:1}
          70%{transform:translateX(-50%) scale(1);opacity:1}
          100%{transform:translateX(-50%) scale(.8);opacity:0}
        }
    </style>
</head>
<body>

<!-- TITLE SCREEN -->
<div id="title-screen" class="screen">
    <div class="floating-cupcakes" id="floating-cupcakes"></div>
    <span class="crown-icon">👑</span>
    <div class="title-logo">Petualangan<br>Permen</div>
    <button class="btn-play" onclick="startGame()">✨ Mulai ✨</button>
</div>

<!-- GAME SCREEN -->
<div id="game-screen" class="screen hidden">
    <img id="bg-image" src="assets/bg_game.png" alt="" onload="this.style.display='block';document.getElementById('bg-canvas').style.display='none';">
    <canvas id="bg-canvas"></canvas>

    <div class="game-wrapper">
        <!-- HUD -->
        <div class="hud">
            <button class="btn-menu" onclick="goTitle()">🏠 Menu</button>
            <div class="hud-title">👑 Petualangan<span>Permen</span></div>
            <div class="hud-stat">
                <div class="hud-stat-label">Moves</div>
                <div class="hud-stat-val" id="moves-val">25</div>
            </div>
            <div class="score-bar-wrap">
                <div class="score-bar-bg"><div class="score-bar-fill" id="score-bar"></div></div>
                <div class="score-label">Score: <span id="score-val">0</span></div>
            </div>
            <div class="hud-stat">
                <div class="hud-stat-label">Target</div>
                <div class="hud-stat-val" id="target-val">🧁×30</div>
            </div>
        </div>

        <!-- POWERUPS -->
        <div class="powerup-bar">
            <div class="powerup-btn" id="pu-rainbow" onclick="activatePowerup('rainbow')" title="Rainbow Blast">
                <img src="assets/powerup1.png" alt="powerup1" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
                <span class="pu-fallback" style="display:none">🌈</span>
                <div class="powerup-count" id="pu-rainbow-count">3</div>
            </div>
            <div class="powerup-btn" id="pu-bomb" onclick="activatePowerup('bomb')" title="Cupcake Bomb">
                <img src="assets/powerup2.png" alt="powerup2" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
                <span class="pu-fallback" style="display:none">💣</span>
                <div class="powerup-count" id="pu-bomb-count">2</div>
            </div>
            <div class="powerup-btn" id="pu-roller" onclick="activatePowerup('roller')" title="Roller Sweep">
                <img src="assets/powerup3.png" alt="powerup3" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
                <span class="pu-fallback" style="display:none">🎠</span>
                <div class="powerup-count" id="pu-roller-count">2</div>
            </div>
        </div>

        <!-- GRID -->
        <div class="grid-container">
            <div id="game-grid"></div>
        </div>

        <!-- PRINCESS / CHARACTER -->
        <div class="princess-area">
            <div class="char-wrapper" id="char-wrapper">
                <img id="character-sprite"
                     src="assets/anim_character/hold_01.png"
                     alt="character"
                     onerror="this.style.display='none'; document.getElementById('princess-canvas').style.display='block';">
                <!-- Hand item: cupcake OR powerup -->
                <img id="hand-item" src="" alt="held item">
                <canvas id="princess-canvas" width="80" height="110" style="display:none"></canvas>
            </div>

            <!-- Next cupcake preview -->
            <div class="next-cupcake">
                <div class="next-label">Next</div>
                <img id="next-preview" class="cupcake-preview-img" width="36" height="36" src="" alt="">
                <canvas id="next-canvas" width="36" height="36" style="display:none"></canvas>
            </div>
        </div>
    </div>
</div>

<!-- Powerup mode banner -->
<div class="pu-mode-banner" id="pu-mode-banner">✨ Tap kotak untuk pakai!</div>

<!-- WIN OVERLAY -->
<div class="overlay" id="win-overlay">
    <div class="modal">
        <div class="modal-title">🎉 Menang! 🎉</div>
        <img id="win-char-sprite" src="assets/anim_character/throw_06.png"
             style="height:120px;width:auto;image-rendering:pixelated;display:block;margin:0 auto 8px;"
             onerror="this.style.display='none'">
        <div class="modal-score" id="win-score">Score: 0</div>
        <button class="btn-modal" onclick="nextLevel()">Level Selanjutnya ➡</button>
        <button class="btn-modal" onclick="goTitle()" style="background:linear-gradient(135deg,#ccc,#aaa)">Menu</button>
    </div>
</div>

<!-- LOSE OVERLAY -->
<div class="overlay" id="lose-overlay">
    <div class="modal">
        <div class="modal-title">😢 Coba Lagi!</div>
        <img id="lose-char-sprite" src="assets/anim_character/lose.png"
             style="height:120px;width:auto;image-rendering:pixelated;display:block;margin:0 auto 8px;"
             onerror="this.style.display='none'">
        <div class="modal-score" id="lose-score">Score: 0</div>
        <button class="btn-modal" onclick="restartGame()">🔄 Main Lagi</button>
        <button class="btn-modal" onclick="goTitle()" style="background:linear-gradient(135deg,#ccc,#aaa)">Menu</button>
    </div>
</div>

<script>
    // Polyfill roundRect
    if (!CanvasRenderingContext2D.prototype.roundRect) {
      CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
        var radius = typeof r === 'number' ? r : (Array.isArray(r) ? r[0] : 0);
        radius = Math.min(radius, Math.abs(w)/2, Math.abs(h)/2);
        var x2=x+w,y2=y+h;
        if(w<0){var t=x;x=x2;x2=t;}
        if(h<0){var t2=y;y=y2;y2=t2;}
        this.beginPath();
        this.moveTo(x+radius,y);
        this.lineTo(x2-radius,y);
        this.quadraticCurveTo(x2,y,x2,y+radius);
        this.lineTo(x2,y2-radius);
        this.quadraticCurveTo(x2,y2,x2-radius,y2);
        this.lineTo(x+radius,y2);
        this.quadraticCurveTo(x,y2,x,y2-radius);
        this.lineTo(x,y+radius);
        this.quadraticCurveTo(x,y,x+radius,y);
        this.closePath();
        return this;
      };
    }

    // =============================================
    //  ASSET DEFINITIONS
    // =============================================
    const CUPCAKE_NAMES = ['merah','biru','kuning','hijau','ungu','coklat'];
    const CUPCAKE_ASSETS = CUPCAKE_NAMES.map(n => `assets/cupcake_${n}.png`);

    const PECAH_ASSETS = CUPCAKE_NAMES.map(n =>
      [1,2,3,4,5].map(i => `assets/anim_pecah_${n}/pecah_0${i}.png`)
    );

    const CHAR_HOLD  = [1,2,3].map(i => `assets/anim_character/hold_0${i}.png`);
    const CHAR_THROW = [1,2,3,4,5,6,7,8].map(i => `assets/anim_character/throw_0${i}.png`);

    const PU_ASSETS = {
      rainbow: {
        hold:  [1,2].map(i=>`assets/anim_powerup1/hold_0${i}.png`),
        use:   [1,2,3,4].map(i=>`assets/anim_powerup1/use_0${i}.png`),
        // image to show in hand when selected
        handImg: 'assets/powerup1.png',
        // image to fly toward grid
        flyImg:  'assets/anim_powerup1/hold_01.png',
      },
      bomb: {
        hold:   [`assets/anim_powerup2/hold_01.png`],
        throw:  [1,2,3,4,5].map(i=>`assets/anim_powerup2/throw_0${i}.png`),
        explode:[1,2,3].map(i=>`assets/anim_powerup2/explode_0${i}.png`),
        handImg: 'assets/powerup2.png',
        flyImg:  'assets/anim_powerup2/hold_01.png',
      },
      roller: {
        hold:   [1,2].map(i=>`assets/anim_powerup3/hold_0${i}.png`),
        throw:  [1,2,3,4].map(i=>`assets/anim_powerup3/throw_0${i}.png`),
        explode:[1,2,3].map(i=>`assets/anim_powerup3/explode_0${i}.png`),
        handImg: 'assets/powerup3.png',
        flyImg:  'assets/anim_powerup3/hold_01.png',
      },
    };

    // Powerup fallback emojis (if images missing)
    const PU_EMOJI = { rainbow:'🌈', bomb:'💣', roller:'🎠' };

    // =============================================
    //  IMAGE PRELOADER
    // =============================================
    const imgCache = {};
    function loadImg(src) {
      if (imgCache[src]) return imgCache[src];
      const img = new Image();
      img.src = src;
      imgCache[src] = img;
      return img;
    }
    function preloadAll() {
      CUPCAKE_ASSETS.forEach(loadImg);
      PECAH_ASSETS.forEach(arr => arr.forEach(loadImg));
      CHAR_HOLD.forEach(loadImg);
      CHAR_THROW.forEach(loadImg);
      Object.values(PU_ASSETS).forEach(obj => {
        Object.entries(obj).forEach(([k,v]) => {
          if(Array.isArray(v)) v.forEach(loadImg);
          else if(typeof v === 'string') loadImg(v);
        });
      });
    }
    preloadAll();

    // =============================================
    //  CHARACTER SPRITE ANIMATION CONTROLLER
    // =============================================
    let charAnim = { frames: CHAR_HOLD, idx: 0, timer: null, loop: true };

    function playCharAnim(type, onDone) {
      const el = document.getElementById('character-sprite');
      if (!el) return;
      clearInterval(charAnim.timer);
      let frames, loop;
      if (type === 'hold') { frames = CHAR_HOLD; loop = true; }
      else if (type === 'throw') { frames = CHAR_THROW; loop = false; }
      else { frames = CHAR_HOLD; loop = true; }

      charAnim = { frames, idx: 0, loop };
      el.src = frames[0];

      const fps = type === 'throw' ? 60 : 300;
      charAnim.timer = setInterval(() => {
        charAnim.idx++;
        if (charAnim.idx >= charAnim.frames.length) {
          if (charAnim.loop) { charAnim.idx = 0; }
          else {
            clearInterval(charAnim.timer);
            charAnim.idx = charAnim.frames.length - 1;
            playCharAnim('hold');
            if (onDone) onDone();
            return;
          }
        }
        el.src = charAnim.frames[charAnim.idx];
      }, fps);
    }

    // =============================================
    //  HAND ITEM CONTROLLER (cupcake or powerup)
    // =============================================
    function setHandItem(src, isPowerup) {
      const el = document.getElementById('hand-item');
      if (!el) return;
      el.src = src;
      el.style.display = 'block';
      el.classList.remove('throwing');
      if (isPowerup) {
        el.classList.add('powerup-held');
      } else {
        el.classList.remove('powerup-held');
      }
      el.onerror = () => { el.style.display = 'none'; };
      el.onload  = () => { el.style.display = 'block'; };
    }

    function hideHandItem() {
      const el = document.getElementById('hand-item');
      if (el) el.classList.add('throwing');
    }

    function showHandItem() {
      const el = document.getElementById('hand-item');
      if (el) el.classList.remove('throwing');
    }

    // =============================================
    //  POWERUP HAND ANIMATION — hold frames loop in hand
    // =============================================
    let puHandAnim = null;
    function startPowerupHoldAnim(type) {
      stopPowerupHoldAnim();
      const frames = PU_ASSETS[type]?.hold;
      if (!frames || frames.length < 2) {
        // Single frame or none — just set it
        setHandItem(PU_ASSETS[type]?.handImg || PU_ASSETS[type]?.hold?.[0] || '', true);
        return;
      }
      let fi = 0;
      setHandItem(frames[0], true);
      puHandAnim = setInterval(() => {
        fi = (fi + 1) % frames.length;
        const el = document.getElementById('hand-item');
        if (el) { el.src = frames[fi]; }
      }, 200);
    }

    function stopPowerupHoldAnim() {
      if (puHandAnim) { clearInterval(puHandAnim); puHandAnim = null; }
    }

    // =============================================
    //  PECAH (MATCH BURST) ANIMATION
    // =============================================
    function playPecahAt(rect, colorIdx) {
      const frames = PECAH_ASSETS[colorIdx] || PECAH_ASSETS[0];
      const sz = Math.max(rect.width, rect.height) * 1.6;
      const el = document.createElement('img');
      el.className = 'pecah-anim';
      el.style.width = sz + 'px';
      el.style.height = sz + 'px';
      el.style.left = (rect.left + rect.width/2 - sz/2) + 'px';
      el.style.top  = (rect.top  + rect.height/2 - sz/2) + 'px';
      el.src = frames[0];
      document.body.appendChild(el);

      let fi = 0;
      const interval = setInterval(() => {
        fi++;
        if (fi >= frames.length) { clearInterval(interval); el.remove(); return; }
        el.src = frames[fi];
      }, 70);
    }

    // =============================================
    //  FALLBACK CANVAS DRAWING
    // =============================================
    const CUPCAKE_COLORS = [
      { name:'merah',  top:'#ff69b4', base:'#c0392b', frosting:'#ff9dc8' },
      { name:'biru',   top:'#5bc8f5', base:'#2980b9', frosting:'#90d9f5' },
      { name:'kuning', top:'#f5c842', base:'#e67e22', frosting:'#ffe082' },
      { name:'hijau',  top:'#7dc95e', base:'#27ae60', frosting:'#b0e57c' },
      { name:'ungu',   top:'#b97ae6', base:'#8e44ad', frosting:'#d4a8f0' },
      { name:'coklat', top:'#a0522d', base:'#6b3a1f', frosting:'#c87941' },
    ];

    function drawCupcakeFallback(ctx, x, y, size, colorIdx, frozen=false) {
      const c = CUPCAKE_COLORS[colorIdx] || CUPCAKE_COLORS[0];
      const s = size;
      ctx.save(); ctx.translate(x, y);
      ctx.shadowColor='rgba(0,0,0,.2)'; ctx.shadowBlur=4; ctx.shadowOffsetY=2;
      const bw=s*.7, bh=s*.38, tw=s*.5;
      ctx.fillStyle=c.base;
      ctx.beginPath();
      ctx.moveTo(-bw/2,0); ctx.lineTo(bw/2,0);
      ctx.lineTo(tw/2,-bh); ctx.lineTo(-tw/2,-bh);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle=c.top;
      ctx.beginPath(); ctx.arc(0,-bh-s*.22,s*.34,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=c.frosting;
      ctx.beginPath(); ctx.arc(-s*.08,-bh-s*.28,s*.15,0,Math.PI*2); ctx.fill();
      if(frozen){
        ctx.fillStyle='rgba(180,230,255,.5)';
        ctx.beginPath(); ctx.arc(0,-bh-s*.22,s*.42,0,Math.PI*2); ctx.fill();
        ctx.font=`${s*.28}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('🧊',0,-bh*0.45);
      }
      ctx.restore();
    }

    function drawPrincess(ctx, w, h, expr='idle') {
      ctx.clearRect(0,0,w,h);
      const cx=w/2, cy=h/2, scale=Math.min(w,h)/120;
      ctx.save(); ctx.translate(cx, cy+h*.05); ctx.scale(scale,scale);
      ctx.fillStyle='#e8883a';
      ctx.beginPath(); ctx.ellipse(0,8,34,42,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#ff69b4';
      ctx.beginPath(); ctx.moveTo(-20,28);
      ctx.bezierCurveTo(-28,38,-40,55,-28,68);
      ctx.bezierCurveTo(-14,76,14,76,28,68);
      ctx.bezierCurveTo(40,55,28,38,20,28); ctx.closePath(); ctx.fill();
      ctx.fillStyle='#f5cba7';
      ctx.beginPath(); ctx.ellipse(0,-12,26,28,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#e8883a';
      ctx.beginPath(); ctx.ellipse(0,-32,26,10,0,Math.PI,0); ctx.fill();
      ctx.fillStyle='#ff69b4';
      ctx.beginPath();
      ctx.moveTo(-16,-38); ctx.lineTo(-20,-52); ctx.lineTo(-8,-44);
      ctx.lineTo(0,-58); ctx.lineTo(8,-44); ctx.lineTo(20,-52); ctx.lineTo(16,-38);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle='#2c1810';
      ctx.beginPath(); ctx.ellipse(-10,-14,5,6,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(10,-14,5,6,0,0,Math.PI*2); ctx.fill();
      if(expr==='excited'||expr==='happy'){
        ctx.fillStyle='#f5c842'; ctx.font='14px serif'; ctx.textAlign='center';
        ctx.fillText('★',-10,-13); ctx.fillText('★',10,-13);
      }
      ctx.strokeStyle='#c0392b'; ctx.lineWidth=2;
      if(expr==='crying'){ ctx.beginPath(); ctx.arc(0,-1,6,Math.PI+.3,-.3,true); ctx.stroke(); }
      else { ctx.beginPath(); ctx.arc(0,-4,8,0.2,Math.PI-.2,false); ctx.stroke(); }
      ctx.restore();
    }

    // =============================================
    //  CELL RENDERING
    // =============================================
    let cellSize = 44;

    function renderCell(r, c) {
      const gridEl = document.getElementById('game-grid');
      const idx = r*COLS+c;
      const cell = gridEl.children[idx];
      if(!cell) return;

      const colorIdx = grid[r][c];
      const isFrozen = frozenCells.has(`${r},${c}`);

      if(isFrozen) cell.classList.add('frozen');
      else cell.classList.remove('frozen');

      if(colorIdx === null) {
        cell.innerHTML = '';
        cell.classList.add('empty-cell');
        return;
      }

      cell.classList.remove('empty-cell');

      const src = CUPCAKE_ASSETS[colorIdx];
      let img = cell.querySelector('img.cell-img');
      if(!img) {
        cell.innerHTML = '';
        img = document.createElement('img');
        img.className = 'cell-img';
        img.style.width = cellSize+'px';
        img.style.height = cellSize+'px';
        img.onerror = () => {
          img.style.display='none';
          let cv = cell.querySelector('canvas');
          if(!cv){
            cv = document.createElement('canvas');
            cv.width=cellSize; cv.height=cellSize;
            cv.style.display='block';
            cell.appendChild(cv);
          }
          const ctx=cv.getContext('2d');
          ctx.clearRect(0,0,cellSize,cellSize);
          ctx.fillStyle='rgba(255,255,255,.4)';
          ctx.beginPath(); ctx.roundRect(1,1,cellSize-2,cellSize-2,8); ctx.fill();
          drawCupcakeFallback(ctx,cellSize/2,cellSize*.78,cellSize*.44,colorIdx,isFrozen);
        };
        cell.appendChild(img);
      }

      if(img.src !== location.origin + '/' + src && !img.src.endsWith(src)) {
        img.src = src;
        img.style.display='';
      }
    }

    function renderAllCells() {
      for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) renderCell(r,c);
    }

    // =============================================
    //  NEXT/CURRENT CUPCAKE PREVIEW
    // =============================================
    function renderNextCupcake() {
      const nxtImg = document.getElementById('next-preview');
      if(nxtImg) {
        nxtImg.src = CUPCAKE_ASSETS[nextCupcakeColor];
        nxtImg.style.display='block';
        nxtImg.onerror = () => {
          nxtImg.style.display='none';
          const cv=document.getElementById('next-canvas');
          cv.style.display='block';
          const ctx=cv.getContext('2d');
          ctx.clearRect(0,0,cv.width,cv.height);
          drawCupcakeFallback(ctx,cv.width/2,cv.height*.78,cv.width*.44,nextCupcakeColor);
        };
      }

      // Only show cupcake in hand if no powerup active
      if (!activePowerup) {
        setHandItem(CUPCAKE_ASSETS[currentCupcakeColor], false);
      }
    }

    // =============================================
    //  GAME STATE
    // =============================================
    const COLS = 14;   // ← wider grid (was 11)
    const ROWS = 8;
    const TARGET_SCORE = 50000;
    const TOTAL_MOVES = 25;

    let grid = [];
    let score = 0;
    let moves = TOTAL_MOVES;
    let selected = null;
    let isAnimating = false;
    let currentExpr = 'idle';
    let exprTimer = null;
    let combo = 0;
    let level = 1;
    let targetCollected = 0;
    let targetGoal = 30;
    let activePowerup = null;
    let powerupInventory = { rainbow:3, bomb:2, roller:2 };
    let frozenCells = new Set();
    let nextCupcakeColor = 0;
    let currentCupcakeColor = 0;
    let touchStart = null;

    function initGrid() {
      grid = [];
      frozenCells.clear();
      const FILLED_ROWS = 5;
      for(let r=0;r<ROWS;r++){
        grid[r]=[];
        for(let c=0;c<COLS;c++){
          grid[r][c] = r < FILLED_ROWS ? Math.floor(Math.random()*6) : null;
        }
      }
      for(let i=0;i<4;i++){
        const r=Math.floor(Math.random()*FILLED_ROWS);
        const c=Math.floor(Math.random()*COLS);
        frozenCells.add(`${r},${c}`);
      }
      currentCupcakeColor = Math.floor(Math.random()*6);
      nextCupcakeColor = Math.floor(Math.random()*6);
    }

    // =============================================
    //  BUILD GRID DOM
    // =============================================
    function calcCellSize() {
      const vw=window.innerWidth, vh=window.innerHeight;
      const overhead = 262;
      const gridH = vh - overhead;
      const gridW = vw - 32;
      cellSize = Math.floor(Math.min(gridW/COLS, gridH/ROWS));
      cellSize = Math.max(28, Math.min(cellSize, 62));
    }

    function buildGrid() {
      calcCellSize();
      const gridEl=document.getElementById('game-grid');
      gridEl.innerHTML='';
      gridEl.style.gridTemplateColumns=`repeat(${COLS},${cellSize}px)`;
      gridEl.style.gridTemplateRows=`repeat(${ROWS},${cellSize}px)`;

      for(let r=0;r<ROWS;r++){
        for(let c=0;c<COLS;c++){
          const cell=document.createElement('div');
          cell.className='cell';
          cell.dataset.r=r; cell.dataset.c=c;
          cell.style.width=cellSize+'px';
          cell.style.height=cellSize+'px';
          if(frozenCells.has(`${r},${c}`)) cell.classList.add('frozen');
          if(grid[r][c]===null) cell.classList.add('empty-cell');

          cell.addEventListener('click',()=>onCellClick(r,c));
          cell.addEventListener('touchstart',(e)=>{
            touchStart={r,c}; e.preventDefault();
          },{passive:false});
          cell.addEventListener('touchend',(e)=>{
            if(touchStart&&touchStart.r===r&&touchStart.c===c) onCellClick(r,c);
            touchStart=null; e.preventDefault();
          },{passive:false});

          gridEl.appendChild(cell);
        }
      }
      renderAllCells();
    }

    // =============================================
    //  GAME LOGIC
    // =============================================
    function onCellClick(r, c) {
      if(isAnimating) return;
      if(moves<=0) return;
      if(activePowerup){ usePowerup(activePowerup,r,c); return; }
      if(grid[r][c]!==null){ shakeGrid(); return; }
      shootCupcake(r,c);
    }

    async function shootCupcake(targetRow, targetCol) {
      isAnimating=true;
      playCharAnim('throw');
      await animateShot(targetCol, targetRow, currentCupcakeColor, 'cupcake');

      grid[targetRow][targetCol]=currentCupcakeColor;
      renderCell(targetRow,targetCol);
      moves--;
      updateHUD();

      const group=getConnectedGroup(targetRow,targetCol,currentCupcakeColor);
      const nonFrozen=group.filter(g=>!g.frozen);
      const frozen=group.filter(g=>g.frozen);

      if(group.length>=3){
        combo++;
        if(combo>=3) showComboText(combo);
        const gridEl=document.getElementById('game-grid');

        nonFrozen.forEach(({r,c})=>{
          const cell=gridEl.children[r*COLS+c];
          if(cell){
            cell.classList.add('matched');
            const rect=cell.getBoundingClientRect();
            playPecahAt(rect, grid[r][c] ?? currentCupcakeColor);
            spawnExplosion(cell);
          }
        });

        frozen.forEach(({r,c})=>{
          frozenCells.delete(`${r},${c}`);
          const cell=gridEl.children[r*COLS+c];
          if(cell){
            cell.style.filter='brightness(2)';
            setTimeout(()=>{ cell.style.filter=''; renderCell(r,c); },300);
          }
        });

        await sleep(350);
        const pts=nonFrozen.length*120*(combo>1?combo:1)+frozen.length*50;
        score+=pts; targetCollected+=nonFrozen.length;
        showScorePopup(group,pts);
        nonFrozen.forEach(({r,c})=>{ grid[r][c]=null; });

        await dropDown();
        await sleep(150);
        await resolveMatches();
        updateHUD();
        if(combo>=3) setPrincessExpr('excited');
        else setPrincessExpr('happy');
      } else {
        combo=0;
        setPrincessExpr('idle');
      }

      advanceCupcake();
      isAnimating=false;
      if(targetCollected>=targetGoal){ endGame(true); }
      else if(moves<=0){ endGame(false); }
      else { setTimeout(showHint,2000); }
    }

    function getConnectedGroup(r,c,color){
      const visited=new Set(), result=[], stack=[[r,c]];
      while(stack.length){
        const[cr,cc]=stack.pop();
        const key=`${cr},${cc}`;
        if(visited.has(key)) continue;
        if(cr<0||cr>=ROWS||cc<0||cc>=COLS) continue;
        if(grid[cr][cc]!==color) continue;
        visited.add(key);
        result.push({r:cr,c:cc,frozen:frozenCells.has(key)});
        if(!frozenCells.has(key)){
          stack.push([cr-1,cc],[cr+1,cc],[cr,cc-1],[cr,cc+1]);
        }
      }
      return result;
    }

    // =============================================
    //  FLYING ITEM ANIMATION — cupcake OR powerup
    // =============================================
    async function animateShot(col, landRow, colorIdx, itemType) {
      return new Promise(resolve=>{
        const gridEl=document.getElementById('game-grid');
        // For powerup, we aim at center of grid row/col, not specific empty cell
        const targetIdx = landRow*COLS+col;
        const targetCell = gridEl.children[targetIdx] || gridEl.children[Math.floor(ROWS/2)*COLS+Math.floor(COLS/2)];
        if(!targetCell){resolve();return;}
        const targetRect=targetCell.getBoundingClientRect();

        const handImg = document.getElementById('hand-item');
        let startX, startY;
        if(handImg && !handImg.classList.contains('throwing')) {
          const hRect = handImg.getBoundingClientRect();
          startX = hRect.left + hRect.width/2;
          startY = hRect.top  + hRect.height/2;
          hideHandItem();
        } else {
          const charEl = document.getElementById('character-sprite');
          const pEl = charEl || document.getElementById('princess-canvas');
          const pRect = pEl.getBoundingClientRect();
          startX = pRect.left + pRect.width/2;
          startY = pRect.top  + pRect.height/2;
        }

        const endX=targetRect.left+targetRect.width/2;
        const endY=targetRect.top+targetRect.height/2;

        // Determine which image to fly
        let flySrc;
        if(itemType === 'cupcake') {
          flySrc = CUPCAKE_ASSETS[colorIdx];
        } else {
          // powerup fly image
          flySrc = PU_ASSETS[itemType]?.flyImg || PU_ASSETS[itemType]?.hold?.[0] || CUPCAKE_ASSETS[0];
        }

        const sz=Math.max(cellSize,32);
        const flyEl=document.createElement('img');
        flyEl.className='fly-item';
        flyEl.src=flySrc;
        flyEl.style.width=sz+'px'; flyEl.style.height=sz+'px';
        flyEl.style.left=(startX-sz/2)+'px';
        flyEl.style.top=(startY-sz/2)+'px';
        flyEl.style.imageRendering='pixelated';
        document.body.appendChild(flyEl);

        const duration = itemType === 'cupcake' ? 280 : 320;
        const start=performance.now();
        function step(now){
          const t=Math.min(1,(now-start)/duration);
          const ease=t<0.5?2*t*t:-1+(4-2*t)*t;
          const x=startX+(endX-startX)*ease;
          const dx=endX-startX, dy=endY-startY;
          const arcBulge=Math.abs(dx)*0.4+Math.abs(dy)*0.2;
          const y=startY+dy*ease-arcBulge*Math.sin(Math.PI*t);
          flyEl.style.left=(x-sz/2)+'px';
          flyEl.style.top=(y-sz/2)+'px';
          // Powerups spin faster and grow slightly
          if(itemType !== 'cupcake') {
            flyEl.style.transform=`rotate(${t*360}deg) scale(${1+t*0.3})`;
          } else {
            flyEl.style.transform=`rotate(${t*270}deg)`;
          }
          if(t<1) requestAnimationFrame(step);
          else { flyEl.remove(); resolve(); }
        }
        requestAnimationFrame(step);
      });
    }

    async function resolveMatches(){
      let found=true;
      while(found){
        found=false;
        const popped=new Set();
        for(let r=0;r<ROWS;r++){
          for(let c=0;c<COLS;c++){
            if(grid[r][c]===null) continue;
            if(popped.has(`${r},${c}`)) continue;
            const group=getConnectedGroup(r,c,grid[r][c]);
            if(group.length>=3) group.forEach(({r,c})=>popped.add(`${r},${c}`));
          }
        }
        if(popped.size===0) break;
        found=true; combo++;
        const cells=[...popped].map(s=>{const[r,c]=s.split(',');return{r:+r,c:+c};});
        const gridEl=document.getElementById('game-grid');
        cells.forEach(({r,c})=>{
          const cell=gridEl.children[r*COLS+c];
          if(cell){
            const rect=cell.getBoundingClientRect();
            playPecahAt(rect, grid[r][c]??0);
            cell.classList.add('matched');
            spawnExplosion(cell);
          }
        });
        await sleep(350);
        const pts=cells.length*120*(combo>1?combo:1);
        score+=pts; targetCollected+=cells.length;
        showScorePopup(cells,pts);
        cells.forEach(({r,c})=>{grid[r][c]=null;});
        await dropDown();
        await sleep(150);
        updateHUD();
      }
    }

    async function dropDown(){
      for(let c=0;c<COLS;c++){
        let values=[];
        for(let r=0;r<ROWS;r++) if(grid[r][c]!==null) values.push(grid[r][c]);
        for(let r=0;r<ROWS;r++) grid[r][c]=r<values.length?values[r]:null;
      }
      buildGrid();
      document.querySelectorAll('.cell').forEach(cell=>{
        cell.classList.add('falling');
        setTimeout(()=>cell.classList.remove('falling'),300);
      });
      await sleep(250);
    }

    function shakeGrid(){
      const gridEl=document.getElementById('game-grid');
      gridEl.style.animation='none'; gridEl.offsetHeight;
      gridEl.style.animation='shakeAnim .3s ease';
      setTimeout(()=>gridEl.style.animation='',300);
    }

    function startModalCharAnim(spriteId) {
      const el = document.getElementById(spriteId);
      if (!el) return;
      const frames = [
        'assets/anim_character/throw_06.png',
        'assets/anim_character/throw_07.png',
        'assets/anim_character/throw_08.png',
      ];
      let fi = 0;
      el.src = frames[0];
      el.style.display = 'block';
      if (el._animTimer) clearInterval(el._animTimer);
      el._animTimer = setInterval(() => {
        fi = (fi + 1) % frames.length;
        el.src = frames[fi];
      }, 120);
    }

    function endGame(win){
      setTimeout(()=>{
        if(win){
          setPrincessExpr('excited');
          document.getElementById('win-score').textContent='Score: '+score.toLocaleString();
          document.getElementById('win-overlay').classList.add('show');
          startModalCharAnim('win-char-sprite');
        } else {
          setPrincessExpr('crying');
          document.getElementById('lose-score').textContent='Score: '+score.toLocaleString();
          document.getElementById('lose-overlay').classList.add('show');
          startModalCharAnim('lose-char-sprite');
        }
      },500);
    }

    function showComboText(n){
      const existing=document.querySelector('.combo-text');
      if(existing) existing.remove();
      const el=document.createElement('div');
      el.className='combo-text';
      const labels={3:'Triple! 🔥',4:'Mega! 💥',5:'ULTRA! ⚡',6:'LEGENDARY! 🌟'};
      el.textContent=labels[Math.min(n,6)]||`${n}x COMBO! ✨`;
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),1000);
    }

    function showScorePopup(cells,pts){
      if(!cells.length) return;
      const r=cells[0].r, c=cells[0].c;
      const gridEl=document.getElementById('game-grid');
      const cell=gridEl.children[r*COLS+c];
      if(!cell) return;
      const rect=cell.getBoundingClientRect();
      const el=document.createElement('div');
      el.className='score-popup';
      el.textContent='+'+pts.toLocaleString();
      el.style.left=rect.left+'px'; el.style.top=rect.top+'px';
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),1200);
    }

    function spawnExplosion(cell){
      const rect=cell.getBoundingClientRect();
      const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
      const emojis=['✨','💗','🌸','⭐','🎀'];
      for(let i=0;i<6;i++){
        const p=document.createElement('div');
        p.className='explosion-particle';
        p.textContent=emojis[Math.floor(Math.random()*emojis.length)];
        const angle=Math.random()*Math.PI*2;
        const dist=40+Math.random()*40;
        p.style.setProperty('--tx',Math.cos(angle)*dist+'px');
        p.style.setProperty('--ty',Math.sin(angle)*dist+'px');
        p.style.left=cx+'px'; p.style.top=cy+'px';
        document.body.appendChild(p);
        setTimeout(()=>p.remove(),700);
      }
    }

    function showHint(){
      if(isAnimating||moves<=0) return;
      document.querySelectorAll('.cell.hint').forEach(el=>el.classList.remove('hint'));
      document.querySelectorAll('.hint-arrow').forEach(el=>el.remove());
      let bestR=-1,bestC=-1,bestScore=0;
      for(let r=0;r<ROWS;r++){
        for(let c=0;c<COLS;c++){
          if(grid[r][c]!==null) continue;
          grid[r][c]=currentCupcakeColor;
          const group=getConnectedGroup(r,c,currentCupcakeColor);
          grid[r][c]=null;
          if(group.length>bestScore){ bestScore=group.length; bestR=r; bestC=c; }
        }
      }
      if(bestR===-1) return;
      const gridEl=document.getElementById('game-grid');
      const cell=gridEl.children[bestR*COLS+bestC];
      if(!cell) return;
      const rect=cell.getBoundingClientRect();
      const arrow=document.createElement('div');
      arrow.className='hint-arrow';
      arrow.textContent='✨';
      arrow.style.cssText=`position:fixed;left:${rect.left+rect.width/2}px;top:${rect.top+rect.height/2}px;
        transform:translate(-50%,-50%);font-size:26px;z-index:200;pointer-events:none;
        animation:hintArrow .5s ease-in-out infinite alternate;`;
      document.body.appendChild(arrow);
      grid[bestR][bestC]=currentCupcakeColor;
      const group=getConnectedGroup(bestR,bestC,currentCupcakeColor);
      grid[bestR][bestC]=null;
      group.forEach(({r,c})=>{ const gc=gridEl.children[r*COLS+c]; if(gc) gc.classList.add('hint'); });
      cell.classList.add('hint');
      setTimeout(()=>{
        arrow.remove();
        document.querySelectorAll('.cell.hint').forEach(el=>el.classList.remove('hint'));
      },2500);
    }

    // =============================================
    //  POWERUP — now with hand item + throw animation
    // =============================================
    async function usePowerup(type, r, c) {
      if(powerupInventory[type]<=0) return;
      powerupInventory[type]--;

      // Cancel active powerup mode
      deactivatePowerupMode();

      isAnimating = true;
      moves--;
      updateHUD();
      updatePowerupUI();
      setPrincessExpr('excited');

      // Play throw animation on character
      playCharAnim('throw');

      // Fly the powerup item from hand to the target cell
      await animateShot(c, r, 0, type);

      // Play powerup use/explode animation at target
      const puFrames = type==='rainbow' ? PU_ASSETS.rainbow.use
                     : type==='bomb'    ? PU_ASSETS.bomb.explode
                     :                    PU_ASSETS.roller.explode;
      playPowerupEffect(r, c, puFrames);

      // Calculate affected cells
      const affected=[];
      if(type==='rainbow'){
        for(let cc=0;cc<COLS;cc++) affected.push({r,c:cc});
        for(let rr=0;rr<ROWS;rr++) if(rr!==r) affected.push({r:rr,c});
      } else if(type==='bomb'){
        for(let dr=-2;dr<=2;dr++) for(let dc=-2;dc<=2;dc++){
          const nr=r+dr, nc=c+dc;
          if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS) affected.push({r:nr,c:nc});
        }
      } else if(type==='roller'){
        for(let cc=0;cc<COLS;cc++) affected.push({r,c:cc});
      }

      const gridEl=document.getElementById('game-grid');
      affected.forEach(({r,c})=>{
        const cell=gridEl.children[r*COLS+c];
        if(cell){ cell.classList.add('matched'); spawnExplosion(cell); }
      });

      await sleep(400);

      let pts=affected.length*150;
      score+=pts; targetCollected+=affected.length;
      affected.forEach(({r,c})=>{ grid[r][c]=null; frozenCells.delete(`${r},${c}`); });
      showScorePopup(affected,pts);
      await dropDown();
      await resolveMatches();
      updateHUD();

      // Return to hold with cupcake
      advanceCupcake();
      isAnimating=false;

      if(targetCollected>=targetGoal) endGame(true);
      else if(moves<=0) endGame(false);
    }

    function playPowerupEffect(r, c, frames) {
      if(!frames||!frames.length) return;
      const gridEl=document.getElementById('game-grid');
      const cell=gridEl.children[r*COLS+c];
      if(!cell) return;
      const rect=cell.getBoundingClientRect();
      const sz=cellSize*2.5;
      const el=document.createElement('img');
      el.style.cssText=`position:fixed;width:${sz}px;height:${sz}px;
        left:${rect.left+rect.width/2-sz/2}px;top:${rect.top+rect.height/2-sz/2}px;
        pointer-events:none;z-index:200;image-rendering:pixelated;`;
      el.src=frames[0];
      document.body.appendChild(el);
      let fi=0;
      const iv=setInterval(()=>{
        fi++;
        if(fi>=frames.length){ clearInterval(iv); el.remove(); return; }
        el.src=frames[fi];
      },80);
    }

    function activatePowerup(type) {
      if(powerupInventory[type]<=0) return;
      if(isAnimating) return;

      if(activePowerup===type) {
        // Toggle off
        deactivatePowerupMode();
        return;
      }

      // Deactivate previous if any
      if(activePowerup) deactivatePowerupMode(false);

      activePowerup = type;

      // Update button UI
      document.querySelectorAll('.powerup-btn').forEach(b=>b.classList.remove('active'));
      document.getElementById('pu-'+type).classList.add('active');

      // Show powerup in hand with hold animation
      stopPowerupHoldAnim();
      startPowerupHoldAnim(type);

      // Add body class for cursor change
      document.body.classList.add('powerup-mode');

      // Show banner
      const names = { rainbow:'Rainbow Blast 🌈', bomb:'Cupcake Bomb 💣', roller:'Roller Sweep 🎠' };
      const banner = document.getElementById('pu-mode-banner');
      banner.textContent = `${names[type]} — Tap kotak untuk pakai!`;
      banner.classList.add('show');
      setTimeout(()=>banner.classList.remove('show'), 2000);
    }

    function deactivatePowerupMode(clearButton=true) {
      activePowerup = null;
      stopPowerupHoldAnim();
      document.body.classList.remove('powerup-mode');
      if(clearButton) {
        document.querySelectorAll('.powerup-btn').forEach(b=>b.classList.remove('active'));
      }
      document.getElementById('pu-mode-banner').classList.remove('show');
      // Restore cupcake in hand
      setHandItem(CUPCAKE_ASSETS[currentCupcakeColor], false);
    }

    function updateHUD(){
      document.getElementById('moves-val').textContent=moves;
      document.getElementById('score-val').textContent=score.toLocaleString();
      document.getElementById('target-val').textContent=`🧁×${Math.max(0,targetGoal-targetCollected)}`;
      const pct=Math.min(100,(score/TARGET_SCORE)*100);
      document.getElementById('score-bar').style.width=pct+'%';
    }

    function updatePowerupUI(){
      ['rainbow','bomb','roller'].forEach(t=>{
        document.getElementById('pu-'+t+'-count').textContent=powerupInventory[t];
        document.getElementById('pu-'+t).classList.toggle('disabled',powerupInventory[t]<=0);
      });
    }

    function setPrincessExpr(expr){
      currentExpr=expr;
      if(expr==='excited'||expr==='happy'){
        if(!activePowerup) playCharAnim('hold');
      } else if(expr==='crying'||expr==='sad'){
        playCharAnim('hold');
      }
      const canvas=document.getElementById('princess-canvas');
      if(canvas&&canvas.style.display!=='none'){
        drawPrincess(canvas.getContext('2d'),canvas.width,canvas.height,expr);
      }
      if(exprTimer) clearTimeout(exprTimer);
      if(expr!=='idle'&&expr!=='happy'){
        exprTimer=setTimeout(()=>setPrincessExpr('idle'),2000);
      }
    }

    // =============================================
    //  BACKGROUND
    // =============================================
    function drawBackground(){
      const canvas=document.getElementById('bg-canvas');
      if(!canvas) return;
      const bgImg=document.getElementById('bg-image');
      if(bgImg&&bgImg.complete&&bgImg.naturalWidth) return;

      canvas.width=window.innerWidth; canvas.height=window.innerHeight;
      const ctx=canvas.getContext('2d');
      const w=canvas.width, h=canvas.height;
      const sky=ctx.createLinearGradient(0,0,0,h*.7);
      sky.addColorStop(0,'#a8d8f0'); sky.addColorStop(.5,'#c5e8f7'); sky.addColorStop(1,'#ffd6ee');
      ctx.fillStyle=sky; ctx.fillRect(0,0,w,h);
      const ground=ctx.createLinearGradient(0,h*.65,0,h);
      ground.addColorStop(0,'#c8e6c9'); ground.addColorStop(.3,'#a5d6a7'); ground.addColorStop(1,'#ffd6ee');
      ctx.fillStyle=ground;
      ctx.beginPath();
      ctx.moveTo(0,h*.65);
      ctx.bezierCurveTo(w*.2,h*.6,w*.4,h*.7,w*.5,h*.63);
      ctx.bezierCurveTo(w*.6,h*.56,w*.8,h*.67,w,h*.62);
      ctx.lineTo(w,h); ctx.lineTo(0,h); ctx.closePath(); ctx.fill();
      const tileSize=Math.floor(Math.min(w,h)*.045);
      const px=w*.12,py=h*.72,pw=w*.76,ph=h*.25;
      ctx.save();
      ctx.beginPath(); ctx.roundRect(px,py,pw,ph,16); ctx.clip();
      ctx.fillStyle='#ffcce6'; ctx.fillRect(px,py,pw,ph);
      for(let row=0;row*tileSize<ph+tileSize;row++){
        for(let col=0;col*tileSize<pw+tileSize;col++){
          if((row+col)%2===1){
            ctx.fillStyle='rgba(255,180,220,.4)';
            ctx.fillRect(px+col*tileSize,py+row*tileSize,tileSize,tileSize);
          }
        }
      }
      ctx.restore();
      ctx.strokeStyle='#ff69b4'; ctx.lineWidth=4;
      ctx.beginPath(); ctx.roundRect(px,py,pw,ph,16); ctx.stroke();
    }

    // =============================================
    //  SCREENS
    // =============================================
    function startGame(){
      document.getElementById('title-screen').classList.add('hidden');
      document.getElementById('game-screen').classList.remove('hidden');
      score=0; moves=TOTAL_MOVES+(level-1)*5; combo=0; targetCollected=0;
      powerupInventory={rainbow:3,bomb:2,roller:2};
      activePowerup=null;
      stopPowerupHoldAnim();
      document.body.classList.remove('powerup-mode');
      document.querySelectorAll('.powerup-btn').forEach(b=>b.classList.remove('active'));
      drawBackground();
      initGrid();
      targetGoal=0;
      for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) if(grid[r][c]!==null) targetGoal++;
      buildGrid();
      updateHUD();
      updatePowerupUI();
      renderNextCupcake();
      playCharAnim('hold');
      setPrincessExpr('happy');
      setTimeout(showHint,3000);
    }

    function advanceCupcake(){
      currentCupcakeColor=nextCupcakeColor;
      nextCupcakeColor=Math.floor(Math.random()*6);
      renderNextCupcake();
      // Only show cupcake in hand if no powerup is selected
      if(!activePowerup) {
        setHandItem(CUPCAKE_ASSETS[currentCupcakeColor], false);
        playCharAnim('hold');
      }
    }

    function stopModalCharAnim(spriteId) {
      const el = document.getElementById(spriteId);
      if (el && el._animTimer) { clearInterval(el._animTimer); el._animTimer = null; }
    }

    function nextLevel(){
      level++;
      stopModalCharAnim('win-char-sprite');
      document.getElementById('win-overlay').classList.remove('show');
      startGame();
    }

    function restartGame(){
      stopModalCharAnim('lose-char-sprite');
      document.getElementById('lose-overlay').classList.remove('show');
      level=1;
      startGame();
    }

    function goTitle(){
      stopModalCharAnim('win-char-sprite');
      stopModalCharAnim('lose-char-sprite');
      document.getElementById('win-overlay').classList.remove('show');
      document.getElementById('lose-overlay').classList.remove('show');
      document.getElementById('game-screen').classList.add('hidden');
      document.getElementById('title-screen').classList.remove('hidden');
      deactivatePowerupMode();
    }

    // =============================================
    //  TITLE FLOATING CUPCAKES
    // =============================================
    function spawnFloatingCupcakes(){
      const container=document.getElementById('floating-cupcakes');
      const emojis=['🧁','🍭','🍬','🎀','💗','⭐','👑','🌸'];
      for(let i=0;i<14;i++){
        const el=document.createElement('div');
        el.className='fc';
        el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
        el.style.left=Math.random()*100+'vw';
        el.style.animationDuration=(5+Math.random()*8)+'s';
        el.style.animationDelay=(-Math.random()*8)+'s';
        el.style.fontSize=(24+Math.random()*30)+'px';
        container.appendChild(el);
      }
    }

    function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

    window.addEventListener('resize',()=>{
      if(!document.getElementById('game-screen').classList.contains('hidden')){
        drawBackground(); buildGrid();
      }
    });

    const style=document.createElement('style');
    style.textContent=`@keyframes shakeAnim{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}`;
    document.head.appendChild(style);

    spawnFloatingCupcakes();
</script>
